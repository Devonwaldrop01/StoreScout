<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StoreScout — Product Demo Loop</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 960px;
    height: 560px;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #07090f;
  }

  /* ── Layout ── */
  .scene {
    width: 960px;
    height: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    position: relative;
    overflow: hidden;
  }

  /* ── Background glows ── */
  .glow-top {
    position: absolute;
    top: -120px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 500px;
    background: radial-gradient(circle, rgba(163,240,0,0.06) 0%, transparent 65%);
    pointer-events: none;
  }
  .glow-bottom {
    position: absolute;
    bottom: -80px; left: 50%;
    transform: translateX(-50%);
    width: 500px; height: 300px;
    background: radial-gradient(circle, rgba(59,130,246,0.05) 0%, transparent 65%);
    pointer-events: none;
  }

  /* ── Label above input ── */
  .scene-label {
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.28);
    letter-spacing: 0.04em;
    position: relative;
    z-index: 2;
  }

  /* ── URL Input row ── */
  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 2;
    width: 680px;
  }

  .url-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 14px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    font-weight: 600;
    color: #ffffff;
    display: flex;
    align-items: center;
    gap: 2px;
    transition: border-color 0.3s;
    min-height: 52px;
  }
  .url-input.active {
    border-color: rgba(163,240,0,0.4);
    box-shadow: 0 0 0 3px rgba(163,240,0,0.07);
  }
  .url-input.scanning {
    border-color: rgba(163,240,0,0.6);
  }

  .url-text { color: #ffffff; }
  .url-cursor {
    width: 2px; height: 20px;
    background: #a3f000;
    border-radius: 1px;
    animation: blink 0.9s step-end infinite;
    flex-shrink: 0;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .scan-btn {
    background: #a3f000;
    color: #07090f;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 800;
    padding: 14px 28px;
    border-radius: 10px;
    border: none;
    white-space: nowrap;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: -0.01em;
  }
  .scan-btn.pressed {
    opacity: 0.75;
    transform: scale(0.96);
  }

  /* ── Scanning state ── */
  .scan-status {
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .scan-status.visible { opacity: 1; }

  .scan-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #a3f000;
    margin: 0 2px;
    animation: dot-bounce 1.1s ease-in-out infinite;
  }
  .scan-dots span:nth-child(2) { animation-delay: 0.15s; }
  .scan-dots span:nth-child(3) { animation-delay: 0.30s; }
  @keyframes dot-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40%           { transform: translateY(-6px); opacity: 1; }
  }
  .scan-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: rgba(163,240,0,0.6);
    letter-spacing: 0.08em;
  }

  /* ── Metric cards grid ── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    width: 680px;
    position: relative;
    z-index: 2;
  }

  .metric-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    position: relative;
    overflow: hidden;
  }
  .metric-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(to right, transparent, rgba(163,240,0,0.3), transparent);
  }
  .metric-card.show {
    opacity: 1;
    transform: translateY(0);
  }

  .metric-label {
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .metric-value {
    font-size: 34px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .metric-card:nth-child(2) .metric-value { color: #ef4444; }
  .metric-card:nth-child(4) .metric-value { color: #a3f000; }

  .metric-sub {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.2);
    line-height: 1.3;
  }

  /* ── Store badge ── */
  .store-badge {
    position: absolute;
    top: 28px; right: 40px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 999px;
    padding: 6px 14px;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: 3;
  }
  .store-badge.show { opacity: 1; }
  .store-badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #a3f000;
  }
  .store-badge-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
  }

  /* ── Brand watermark ── */
  .brand {
    position: absolute;
    bottom: 22px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 2;
    opacity: 0.3;
  }
  .brand-dot { width: 6px; height: 6px; border-radius: 50%; background: #a3f000; }
  .brand-name { font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="scene" id="scene">

  <div class="glow-top"></div>
  <div class="glow-bottom"></div>

  <!-- Store badge (appears with results) -->
  <div class="store-badge" id="badge">
    <div class="store-badge-dot"></div>
    <span class="store-badge-text">gymshark.com · 847 products</span>
  </div>

  <!-- Label -->
  <div class="scene-label" id="label">Paste any Shopify competitor URL</div>

  <!-- Input row -->
  <div class="input-row">
    <div class="url-input" id="urlInput">
      <span class="url-text" id="urlText"></span>
      <span class="url-cursor" id="cursor"></span>
    </div>
    <button class="scan-btn" id="scanBtn">Analyze →</button>
  </div>

  <!-- Scanning indicator -->
  <div class="scan-status" id="scanStatus">
    <div class="scan-dots">
      <span></span><span></span><span></span>
    </div>
    <span class="scan-text">Scanning catalog</span>
  </div>

  <!-- Metric cards -->
  <div class="metrics" id="metrics">
    <div class="metric-card" id="card0">
      <div class="metric-label">Products</div>
      <div class="metric-value">847</div>
      <div class="metric-sub">in catalog</div>
    </div>
    <div class="metric-card" id="card1">
      <div class="metric-label">On Sale Now</div>
      <div class="metric-value">34%</div>
      <div class="metric-sub">of catalog discounted</div>
    </div>
    <div class="metric-card" id="card2">
      <div class="metric-label">Median Price</div>
      <div class="metric-value">$52</div>
      <div class="metric-sub">P25 $28 · P75 $75</div>
    </div>
    <div class="metric-card" id="card3">
      <div class="metric-label">New This Month</div>
      <div class="metric-value">14</div>
      <div class="metric-sub">products launched</div>
    </div>
  </div>

  <!-- Brand -->
  <div class="brand">
    <div class="brand-dot"></div>
    <span class="brand-name">StoreScout</span>
  </div>

</div>

<script>
  const URL_TARGET = 'gymshark.com';

  // Timings (ms)
  const T = {
    typeStart:   400,
    typeSpeed:   80,      // ms per character
    pauseAfterType: 320,
    btnPress:    200,     // how long button looks pressed
    scanDuration: 1100,
    cardDelay:   160,     // stagger between cards
    holdResults: 2000,    // how long to show results before reset
    fadeOut:     500,
    loopPause:   300,
  };

  const urlText  = document.getElementById('urlText');
  const cursor   = document.getElementById('cursor');
  const urlInput = document.getElementById('urlInput');
  const scanBtn  = document.getElementById('scanBtn');
  const scanStatus = document.getElementById('scanStatus');
  const badge    = document.getElementById('badge');
  const cards    = [0,1,2,3].map(i => document.getElementById('card'+i));

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function resetAll() {
    urlText.textContent = '';
    cursor.style.display = 'inline-block';
    urlInput.classList.remove('active', 'scanning');
    scanBtn.classList.remove('pressed');
    scanStatus.classList.remove('visible');
    badge.classList.remove('show');
    cards.forEach(c => c.classList.remove('show'));
    scanBtn.textContent = 'Analyze →';
    scanBtn.style.opacity = '';
  }

  async function runLoop() {
    resetAll();
    await sleep(T.loopPause);

    // 1 — Type the URL
    urlInput.classList.add('active');
    await sleep(T.typeStart);

    for (let i = 0; i < URL_TARGET.length; i++) {
      urlText.textContent += URL_TARGET[i];
      await sleep(T.typeSpeed + (Math.random() * 30 - 15)); // tiny jitter
    }

    await sleep(T.pauseAfterType);

    // 2 — Press button
    scanBtn.classList.add('pressed');
    await sleep(T.btnPress);
    scanBtn.classList.remove('pressed');
    scanBtn.textContent = 'Analyzing…';
    scanBtn.style.opacity = '0.55';

    // 3 — Scanning state
    cursor.style.display = 'none';
    urlInput.classList.remove('active');
    urlInput.classList.add('scanning');
    scanStatus.classList.add('visible');

    await sleep(T.scanDuration);

    // 4 — Results appear
    scanStatus.classList.remove('visible');
    badge.classList.add('show');

    for (let i = 0; i < cards.length; i++) {
      await sleep(T.cardDelay);
      cards[i].classList.add('show');
    }

    await sleep(T.holdResults);

    // 5 — Fade out scene, then loop
    const scene = document.getElementById('scene');
    scene.style.transition = `opacity ${T.fadeOut}ms`;
    scene.style.opacity = '0';
    await sleep(T.fadeOut);
    resetAll();
    scene.style.opacity = '1';

    // Loop
    runLoop();
  }

  runLoop();
</script>
</body>
</html>
