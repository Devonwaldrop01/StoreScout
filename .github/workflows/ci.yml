name: CI

# Runs on every PR and on pushes to main. No production secrets are required:
# the backend imports and tests run against config defaults (empty keys), and
# tests use in-memory fakes + the no-API-key fallback path, so nothing reaches
# a real database, Redis, or Anthropic.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (install · import · tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # matches the Railway/Dockerfile base image
          cache: pip

      - name: Install pinned dependencies
        env:
          # The app pins playwright to the Docker base-image version; CI only
          # needs the wheel, not the browsers.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Import check (compiles the app against pinned deps)
        run: python -c "import app.main; print('app.main imported OK')"

      - name: Unit tests
        env:
          ANTHROPIC_API_KEY: ""   # forces the AI no-key fallback path; no network
        run: python -m pytest -q

  frontend:
    name: Frontend (typecheck · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (from lockfile)
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        # Non-blocking: the repo carries an accepted baseline of react-hooks
        # idioms (static-components / purity) that predate this workflow, so lint
        # is surfaced for review but does not fail the build. tsc + tests + build
        # are the blocking gates. Remove continue-on-error once the baseline is
        # cleaned up.
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
